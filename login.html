<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login | Nexus University</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Back to Home -->
    <a href="index.html" class="back-btn">
        <i class="ph ph-arrow-left"></i> Back to Home
    </a>

    <div class="login-container">
        <div class="login-card fade-in-up">
            <div class="login-header">
                <div class="logo">
                    <i class="ph-fill ph-graduation-cap"></i>
                </div>
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access the student portal.</p>
            </div>
            
            <form action="#" class="login-form">
                <div class="input-group">
                    <label for="student-id">Student ID or Email</label>
                    <div class="input-wrapper">
                        <i class="ph ph-user"></i>
                        <input type="text" id="student-id" placeholder="Enter your ID or Email" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="ph ph-eye-slash"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>
            
            <div class="login-footer">
                <p>New student? <a href="apply.html">Apply for Admission</a></p>
            </div>
        </div>
    </div>

    <!-- Simple JS to toggle password visibility -->
    <script>
        const togglePassword = document.querySelector('.toggle-password');
        const passwordInput = document.querySelector('#password');
        const icon = togglePassword.querySelector('i');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                icon.classList.remove('ph-eye-slash');
                icon.classList.add('ph-eye');
            } else {
                icon.classList.remove('ph-eye');
                icon.classList.add('ph-eye-slash');
            }
        });
    </script>
</body>
</html>
